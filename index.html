<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Elbo — YOU'RE THE LOCATION</title>
  <meta name="description" content="Elbo — YOU'RE THE LOCATION. Social media that follows you, not the other way around." />

  <style>
    :root{
      --bg:#000;
      --text:#F4F6FF;
      --muted:rgba(244,246,255,0.72);
      --card:transparent;
      --stroke:transparent;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 30% 25%, rgba(44,108,255,0.18), transparent 60%),
        radial-gradient(820px 520px at 75% 30%, rgba(57,255,20,0.14), transparent 60%),
        var(--bg);
    }

    .wrap{
      width:100%;
      max-width:860px;
      text-align:center;
    }

    .logo{
      width:min(720px, 92vw);
      height:auto;
      display:block;
      margin:0 auto 18px;
      filter:
        drop-shadow(0 0 22px rgba(44,108,255,0.18))
        drop-shadow(0 0 18px rgba(57,255,20,0.12));
    }

    .headline{
      font-size:22px;
      font-weight:600;
      letter-spacing:-0.01em;
      margin:0 0 18px;
      color:rgba(244,246,255,0.92);
    }

    .card{
      margin:0 auto;
      max-width:560px;
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:18px;
      backdrop-filter: blur(10px);
    }

    .tiny{
      margin-top:10px;
      font-size:12px;
      color:rgba(244,246,255,0.55);
    }

    .links{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .links a{
      color:rgba(244,246,255,0.70);
      text-decoration:none;
      font-size:14px;
    }

    .links a:hover{
      color:rgba(244,246,255,0.95);
    }

    .foot{
      margin-top:22px;
      font-size:12px;
      color:rgba(244,246,255,0.40);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <img class="logo" src="elbo-logo.png" alt="Elbo" />

    <div class="headline">YOU'RE THE LOCATION</div>

    <div class="card">
      <div class="ml-embedded" data-form="QIKU9x"></div>
      <div class="tiny">No spam. Just beta + launch updates.</div>
    </div>

    <div class="links">
      <a href="#" onclick="return false;">Instagram</a>
      <a href="#" onclick="return false;">X (Twitter)</a>
    </div>

    <div class="foot">© <span id="y"></span> Elbo</div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
